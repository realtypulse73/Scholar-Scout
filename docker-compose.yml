services:
  postgres:
    image: postgres:16-alpine
    container_name: scholarscout-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: scholarscout
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d scholarscout"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
