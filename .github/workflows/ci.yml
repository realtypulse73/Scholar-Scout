name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  web-quality-gate:
    name: Web quality gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck web app
        run: npm run typecheck --workspace @scholar-scout/web

      - name: Lint web app
        run: npm run lint --workspace @scholar-scout/web

      - name: Run web tests
        run: npm run test --workspace @scholar-scout/web -- --runInBand

      - name: Build web app
        run: npm run build:web
