name: Autonomous Product Manager

on:
  schedule:
    - cron: '30 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  autonomous-product-manager:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Generate dynamic roadmap and issue packets
        run: node scripts/autonomous-product-manager.mjs

      - name: Commit roadmap updates
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add reports/product-ops
          git commit -m "chore: update autonomous roadmap" || echo "No changes"
          git push

      - name: Create roadmap issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          node -e '
          const fs = require("fs");
          const packets = JSON.parse(fs.readFileSync("reports/product-ops/autonomous-issues.json", "utf8"));
          for (const packet of packets) {
            const title = `[${packet.priority}] ${packet.title}`;
            const labels = packet.labels.join(",");
            const body = packet.body.replace(/"/g, "\\\"");
            const command = `gh issue create --title "${title}" --label "${labels}" --body "${body}"`;
            console.log(command);
          }
          '
