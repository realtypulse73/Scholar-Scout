name: ScholarScout Production Readiness

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: Production URL to validate
        required: false
        type: string

permissions:
  contents: read
  actions: read

concurrency:
  group: scholarscout-production-readiness
  cancel-in-progress: true

jobs:
  env-check:
    name: Production env check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NEXTAUTH_URL: ${{ inputs.base_url || secrets.NEXTAUTH_URL }}
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      GITHUB_CLIENT_ID: ${{ secrets.GITHUB_CLIENT_ID }}
      GITHUB_CLIENT_SECRET: ${{ secrets.GITHUB_CLIENT_SECRET }}
      SCHOLARSCOUT_STAFF_EMAILS: ${{ secrets.SCHOLARSCOUT_STAFF_EMAILS }}
      SCHOLARSCOUT_HEALTH_TOKEN: ${{ secrets.SCHOLARSCOUT_HEALTH_TOKEN }}
      SCHOLARSCOUT_DATA_ADAPTER: ${{ secrets.SCHOLARSCOUT_DATA_ADAPTER }}
      SCHOLARSCOUT_BLOB_READ_WRITE_TOKEN: ${{ secrets.SCHOLARSCOUT_BLOB_READ_WRITE_TOKEN || secrets.BLOB_READ_WRITE_TOKEN }}
      BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
      SCHOLARSCOUT_BLOB_DATA_PATH: ${{ secrets.SCHOLARSCOUT_BLOB_DATA_PATH }}
      SCHOLARSCOUT_DATA_SERVICE_URL: ${{ secrets.SCHOLARSCOUT_DATA_SERVICE_URL }}
      SCHOLARSCOUT_DATA_SERVICE_TOKEN: ${{ secrets.SCHOLARSCOUT_DATA_SERVICE_TOKEN }}
      SCHOLARSCOUT_SMOKE_BASE_URL: ${{ inputs.base_url || secrets.SCHOLARSCOUT_SMOKE_BASE_URL }}
      SCHOLARSCOUT_SMOKE_EXPECTED_ADAPTER: ${{ secrets.SCHOLARSCOUT_SMOKE_EXPECTED_ADAPTER }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install without postinstall scripts
        run: npm install --ignore-scripts

      - name: Run production env readiness check
        run: npm run check:production-env

      - name: Write readiness report
        if: always()
        run: npm run check:production-env -- --json > production-env-readiness.json

      - name: Summarize readiness report
        if: always()
        run: npm run report:production -- --env-report production-env-readiness.json >> "$GITHUB_STEP_SUMMARY"

      - name: Upload readiness report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-env-readiness
          path: production-env-readiness.json
          retention-days: 14
